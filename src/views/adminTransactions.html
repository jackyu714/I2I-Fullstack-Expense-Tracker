<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Transactions</title>
    <link rel="stylesheet" href="/styles/adminTransactions.css">
</head>
<body>
    <header>
        <h1>Admin Transactions</h1>
        <nav>
            <ul>
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/logout">Logout</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="transactions">
            <h2>Transaction Records</h2>
            <table>
                <thead>

                        <th>Transaction ID</th>
                        <th>User</th>
                        <th>Amount</th>
                        <th>Status</th>

                </thead>
                <tbody>
                    <!-- Transaction rows will be dynamically rendered here -->
                </tbody>
            </table>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Admin Panel</p>
    </footer>
    <script src="/scripts/adminTransactions.js"></script>
